
services:
  # ─── PostgreSQL ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: medicturn-db
    restart: unless-stopped
    # Valores fijos y explícitos, sin variables dinámicas (como pediste)
    environment:
      POSTGRES_USER: medicturn_user
      POSTGRES_PASSWORD: medicturn_super_secret_2024
      POSTGRES_DB: medicturn_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - medic-network
    healthcheck:
      # CMD-SHELL con credenciales explícitas
      test: ["CMD-SHELL", "pg_isready -U medicturn_user -d medicturn_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (NestJS) ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medicturn-api
    restart: unless-stopped
    # Inyectamos el .env para variables de aplicación
    env_file:
      - .env
    environment:
      # Construida explícitamente con los mismos valores fijos de arriba
      DATABASE_URL: postgresql://medicturn_user:medicturn_super_secret_2024@postgres:5432/medicturn_db?schema=public
      NODE_ENV: production
      PORT: 4000
      UPLOAD_DIR: /app/uploads
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medic-network

  # ─── Frontend (Next.js) ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medicturn-web
    restart: unless-stopped
    # Inyectamos el .env para variables de aplicación
    env_file:
      - .env
    environment:
      PORT: 3000
    ports:
      # Puerto 3003 disponible para Nginx Proxy Manager
      - "127.0.0.1:3003:3000"
    depends_on:
      - backend
    networks:
      - medic-network

volumes:
  postgres-data:
    driver: local
  uploads-data:
    driver: local

networks:
  medic-network:
    driver: bridge
